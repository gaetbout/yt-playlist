<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Roboto, Arial, sans-serif;
      width: 280px;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      color: #0f0f0f;
    }
    h1 {
      font-size: 14px;
      font-weight: 500;
      margin: 0 0 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #606060;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      font-size: 13px;
      font-weight: 500;
      color: white;
      background: #065fd4;
      border: none;
      border-radius: 18px;
      cursor: pointer;
    }
    button:hover { background: #0356c0; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #2ba640;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>YouTube Playlist Helper</h1>
  <label for="playlist-name">Target Playlist name</label>
  <input id="playlist-name" type="text" placeholder="e.g. Musique" autocomplete="off">
  <button id="save">Save</button>
  <div id="status" role="status"></div>
  <script src="popup.js"></script>
</body>
</html>
